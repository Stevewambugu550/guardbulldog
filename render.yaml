services:
  # Backend API
  - type: web
    name: guardbulldog-api
    env: node
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://guardbulldog-bsu-final.netlify.app
      - key: ALLOWED_ORIGINS
        value: https://guardbulldog-bsu-final.netlify.app,http://localhost:3000
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
