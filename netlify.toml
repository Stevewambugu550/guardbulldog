[build]
  base = "client"
  command = "npm install && npm run build"
  publish = "build"

[functions]
  directory = "netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  NPM_VERSION = "9"

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/login"
  status = 200

[[redirects]]
  from = "/api/auth/register"
  to = "/.netlify/functions/register"
  status = 200

[[redirects]]
  from = "/api/auth/google"
  to = "/.netlify/functions/google-auth"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/admin/users"
  to = "/.netlify/functions/admin-users"
  status = 200

[[redirects]]
  from = "/api/admin/users/*"
  to = "/.netlify/functions/admin-users"
  status = 200

[[redirects]]
  from = "/api/admin/reports"
  to = "/.netlify/functions/admin-reports"
  status = 200

[[redirects]]
  from = "/api/admin/stats"
  to = "/.netlify/functions/admin-stats"
  status = 200

[[redirects]]
  from = "/api/reports/user"
  to = "/.netlify/functions/user-reports"
  status = 200

[[redirects]]
  from = "/api/reports/*/status"
  to = "/.netlify/functions/reports-status"
  status = 200

[[redirects]]
  from = "/api/reports/submit"
  to = "/.netlify/functions/reports-submit"
  status = 200

[[redirects]]
  from = "/api/reports/*"
  to = "/.netlify/functions/report-detail?id=:splat"
  status = 200

[[redirects]]
  from = "/api/guest/submit"
  to = "/.netlify/functions/guest-submit"
  status = 200

[[redirects]]
  from = "/api/guest/track/*"
  to = "/.netlify/functions/guest-track"
  status = 200

[[redirects]]
  from = "/api/reports"
  to = "/.netlify/functions/get-reports"
  status = 200

[[redirects]]
  from = "/api/auth/forgot-password"
  to = "/.netlify/functions/forgot-password"
  status = 200

[[redirects]]
  from = "/api/auth/reset-password"
  to = "/.netlify/functions/reset-password"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm start"
  port = 3000
  publish = "client/build"
