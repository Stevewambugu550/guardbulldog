[build]
  command = "npm install && npm run build"
  publish = "build"

[functions]
  directory = "../netlify/functions"

[build.environment]
  NODE_VERSION = "18"
  REACT_APP_API_URL = "https://guardbulldog-bsu-final.netlify.app"

# API redirects MUST come before the SPA catch-all
[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/login"
  status = 200

[[redirects]]
  from = "/api/auth/register"
  to = "/.netlify/functions/register"
  status = 200

[[redirects]]
  from = "/api/auth/google"
  to = "/.netlify/functions/google-auth"
  status = 200

[[redirects]]
  from = "/api/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/api/admin/users/*"
  to = "/.netlify/functions/admin-users"
  status = 200

[[redirects]]
  from = "/api/admin/users"
  to = "/.netlify/functions/admin-users"
  status = 200

[[redirects]]
  from = "/api/admin/reports"
  to = "/.netlify/functions/admin-reports"
  status = 200

[[redirects]]
  from = "/api/admin/stats"
  to = "/.netlify/functions/admin-stats"
  status = 200

[[redirects]]
  from = "/api/reports/user"
  to = "/.netlify/functions/user-reports"
  status = 200

[[redirects]]
  from = "/api/reports/submit"
  to = "/.netlify/functions/reports-submit"
  status = 200

[[redirects]]
  from = "/api/reports/*/status"
  to = "/.netlify/functions/reports-status"
  status = 200

[[redirects]]
  from = "/api/reports"
  to = "/.netlify/functions/get-reports"
  status = 200

[[redirects]]
  from = "/api/guest/submit"
  to = "/.netlify/functions/guest-submit"
  status = 200

[[redirects]]
  from = "/api/guest/track/*"
  to = "/.netlify/functions/guest-track"
  status = 200

[[redirects]]
  from = "/api/dashboard/stats"
  to = "/.netlify/functions/dashboard-stats"
  status = 200

[[redirects]]
  from = "/api/recent-activity"
  to = "/.netlify/functions/recent-activity"
  status = 200

# SPA fallback — must be LAST
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
